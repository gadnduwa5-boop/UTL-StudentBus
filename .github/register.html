<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription Étudiant - UTL StudentBus GPS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:600px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#1565c0;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:5px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#1565c0;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

.message{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}

.link{
    text-align:center;
    margin-top:15px;
}

.link a{
    text-decoration:none;
    color:#1565c0;
}

</style>
</head>
<link rel="stylesheet" href="../css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">

<body>

<div class="container">

<h1>🚍UTL StudentBus GPS</h1>

<form id="registerForm">

<label>Numéro de carte</label>
<input type="text" id="cardId" required>

<label>Nom complet</label>
<input type="text" id="fullname" required>

<label>Téléphone</label>
<input type="tel" id="phone" required>

<label>Faculté</label>
<input type="text" id="faculty" required>

<label>Département</label>
<input type="text" id="department" required>

<label>Promotion</label>
<input type="text" id="promotion" required>

<label>Année académique</label>
<input type="text" id="academicYear" value="2026-2027" required>

<label>Bus souhaité</label>
<select id="busId" required>
    <option value="">Choisir un bus</option>
    <option value="BUS-01">BUS-01</option>
    <option value="BUS-02">BUS-02</option>
    <option value="BUS-03">BUS-03</option>
</select>

<label>Mot de passe</label>
<input type="password" id="password" required>

<label>Confirmer le mot de passe</label>
<input type="password" id="confirmPassword" required>

<button type="submit">
S'inscrire
</button>

</form>

<div class="message" id="message"></div>

<div class="link">
Déjà inscrit ?
<a href="login.html">Se connecter</a>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>

<script>

document.getElementById("registerForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const message = document.getElementById("message");

    const cardId = document.getElementById("cardId").value.trim();
    const fullname = document.getElementById("fullname").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const faculty = document.getElementById("faculty").value.trim();
    const department = document.getElementById("department").value.trim();
    const promotion = document.getElementById("promotion").value.trim();
    const academicYear = document.getElementById("academicYear").value.trim();
    const busId = document.getElementById("busId").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        message.innerHTML = "❌ Les mots de passe ne correspondent pas";
        return;
    }

    try{

        const email = cardId + "@utlstudentbus.app";

        // Création du compte Firebase Auth
        const userCredential =
            await firebase.auth()
            .createUserWithEmailAndPassword(email, password);

        const user = userCredential.user;

        // Enregistrement dans Firestore
        await db.collection("users")
        .doc(cardId)
        .set({

            uid: user.uid,

            cardId: cardId,
            fullname: fullname,
            phone: phone,

            faculty: faculty,
            department: department,
            promotion: promotion,
            academicYear: academicYear,

            busId: busId,

            role: "student",
            status: "pending",
            busLocked: true,

            createdAt: new Date()

        });

        message.innerHTML =
        "✅ Inscription réussie. En attente de validation.";

        document.getElementById("registerForm").reset();

        setTimeout(() => {
            window.location.href = "login.html";
        }, 2000);

    }
    catch(error){

        console.error(error);

        message.innerHTML =
        "❌ " + error.message;

    }

});

</script>

</body>
</html>
