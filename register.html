<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription Étudiant - UTL StudentBus GPS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:600px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#1565c0;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:5px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#1565c0;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

.message{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}

.link{
    text-align:center;
    margin-top:15px;
}

.link a{
    text-decoration:none;
    color:#1565c0;
}

</style>
</head>
<link rel="stylesheet" href="../css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">

<body>

<div class="container">

<h1>inscription des etudiants</h1>

<form id="registerForm">

<label>Numéro de carte</label>
<input type="text" id="cardId" maxlength="9" placeholder="25xxxxxxx" required>

<label>Nom complet</label>
<input type="text" id="fullname" required>

<label>Téléphone</label>
<input type="tel" id="phone" required>

<label for="email">Email :</label>
<input type="email" id="email" name="email" placeholder="ex: test@gmail.com" required>

<label for="faculty">Faculté</label>
<select id="faculty" id="faculty" required>
    <option value="">-- choisir une faculté --</option>
    <option value="appliquées">sciences appliquées</option>
    <option value="informatique">sciences informatique</option>
    <option value="agronomie">sciences agrogomiques</option>
    <option value="gestion">sciences de gestion</option>
    <option value="droits">droits et environnement</option>
    <option value="medecine">médecine</option>
    <option value="petrole">petrole et gaze</option>
</select>


<label for="departement">Département</label>
<select id="departement" required>
    <option value="">--choisir un département--</option>
 </select>

<label for="promotion">Promotion</label>
<select id="promotion" required>
    <option value="">-- Choisir une promotion --</option>
    <option value="L1">L1</option>
    <option value="L2">L2</option>
    <option value="L3">L3</option>
    <option value="M1">M1</option>
    <option value="M2">M2</option>
</select>

<label>Année académique</label>
<input type="text" id="academicYear" value="2026-2027" required>

<label>Bus souhaité</label>
<select id="busId" required>
    <option value="">Choisir un bus</option>
    <option value="BUS-01">BUS-01</option>
    <option value="BUS-02">BUS-02</option>
    <option value="BUS-03">BUS-03</option>
</select>

<label>Mot de passe</label>
<input type="password" id="password" required>

<label>Confirmer le mot de passe</label>
<input type="password" id="confirmPassword" required>

<button type="submit">
S'inscrire
</button>

</form>

<div class="message" id="message"></div>

<div class="link">
Déjà inscrit ?
<a href="login.html">Se connecter</a>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>

<script>

const cardIdInput = document.getElementById("cardId");
const cardMessage = document.getElementById("cardMessage");

cardIdInput.addEventListener("input", function () {

    this.value = this.value.replace(/[^0-9]/g, '');

    const value = this.value;
    const regex = /^25[0-9]{7}$/;

    if (value.length === 0) {
        cardMessage.textContent = "";
        cardMessage.className = "";
    }

    else if (!value.startsWith("25")) {
        cardMessage.className = "error";
    }

    else if (value.length < 9) {
        cardMessage.textContent = '⏳ ${value.length}/9 chiffres saisis';
        cardMessage.className = "warning";
    }

    else if (regex.test(value)) {
        cardMessage.textContent = "✅ Card ID valide";
        cardMessage.className = "success";
    }

    else {
        cardMessage.textContent = "❌ Card ID invalide";
        cardMessage.className = "error";
    }

});

document.getElementById("registerForm").addEventListener("submit", function(e){

    const cardId = document.getElementById("cardId").value;
    const regex = /^25[0-9]{7}$/;

    if(!regex.test(cardId)){
        e.preventDefault();
        alert("Le Card ID doit commencer par 25 et contenir exactement 9 chiffres.");
        return;
    }

    alert("Inscription réussie !");
});
const departement = {
    appliquées: [
        "génie électrique",
        "électromécanique",
        "géologie et mines",
        "electricité",
    ],

    petrole:[
        "métalurgie",
        "biochimie",
        "chimie industiel",
    ],

    droits:[
        "droit public",
        "droit de l'homme",
        "droit privé",
    ],

    agronomie:[
        "agronomie ",
    ],

    informatique: [
        "Génie Logiciel",
        "Intelligence Artificielle",
        "Cybersécurité",
        "Réseaux Informatiques",
        "système informatique"
    ],

    gestion: [
        "Comptabilité",
        "Finance",
        "Marketing",
        "Gestion des Ressources Humaines"
    ],

    medecine: [
        "Médecine Générale",
        "soins infirmiers",
        "Biologie Médicale",
        "Santé Publique"
    ]
};

const facultySelect = document.getElementById("faculty");
const departementSelect = document.getElementById("departement");

facultySelect.addEventListener("change", function() {

    const faculty = this.value;

    departementSelect.innerHTML =
        '<option value="">-- Choisir un département --</option>';

    if (faculty && departement[faculty]) {

        departement[faculty].forEach(departement => {

            const option = document.createElement("option");

            option.value = departement;
            option.textContent = departement;

            departementSelect.appendChild(option);
        });
    }
});
</script>

</body>
</html>
