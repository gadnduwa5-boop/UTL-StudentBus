<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription Étudiant - UTL StudentBus</title>

<link rel="stylesheet" href="css/register.css">
</head>

<body>

<div class="container">

<div style="text-align: center;">
    <img src="image/logo-studentbus.png" alt="UTL student
    Bus" width="180">
</div>

<h2>Inscription Étudiant</h2>

<div class="form">

<div class="input-group">
<label>Numéro de carte</label>
<input type="text" id="cardId" placeholder="Ex : STD0001">
</div>

<div class="input-group">
<label>Nom complet</label>
<input type="text" id="fullname" placeholder="Votre nom complet">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="exemple@gmail.com">
</div>

<div class="input-group">
<label>Téléphone</label>
<input type="tel" id="phone" placeholder="+243 9XXXXXXXX">
</div>

<div class="input-group">
<label>Faculté</label>
<select id="faculty">
<option value="">Sélectionner</option>\
<option value="Polytechnique">Polytechnique</option>
<option value="Sciences Informatiques">Sciences Informatiques</option>
<option value="architecture">architecture</option>
<option value="Droit">sciences juridiques</option>
<option value="Médecine">Médecine</option>
<option value="Économie">sciences Économiques</option>
<option value="Sciences Agronomiques">agronomie et environnement</option>
<option value="information">science de l'information et de la communication</option>

</select>
</div>

<div class="input-group">
<label>Département</label>
<select id="department">
<option value="">Sélectionner d'abord une faculté</option>
</select>
</div>

<div class="input-group">
<label>Promotion</label>
<select id="promotion">
<option value="">Sélectionner</option>
<option>L1</option>
<option>L2</option>
<option>L3</option>
<option>L4</option>
<option>L5</option>
<option>Master 1</option>
<option>Master 2</option>
</select>
</div>
<div class="input-group">
    <label>Bus</label>
    <select id="bus">
        <option value="">Chargement des bus...</option>
    </select>
</div>
<label>Mot de passe</label>
<input type="password" id="password" placeholder="Mot de passe">
</div>

<div class="input-group">
<label>Confirmer le mot de passe</label>
<input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe">
</div>

<button id="registerBtn">
Créer mon compte
</button>

<p id="message"></p>

<p class="login">
Déjà un compte ?
<a href="login.html">Se connecter</a>
</p>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script>
const message = document.getElementById("message");
// Charger les bus depuis Firestore

async function loadBuses() {

    const select = document.getElementById("bus");
    select.innerHTML = '<option value="">Sélectionner un bus</option>';

    const snapshot = await db.collection("buses").get();

    for (const doc of snapshot.docs) {

        const bus = doc.data();

        // Nom du chauffeur
        let chauffeur = "Non affecté";

        if (bus.driverId) {
            const driverDoc = await db.collection("users")
                .doc(bus.driverId)
                .get();

            if (driverDoc.exists) {
                chauffeur = driverDoc.data().fullname;
            }
        }

        // Nombre d'étudiants inscrits
        const students = await db.collection("users")
            .where("role", "==", "student")
            .where("bus", "==", bus.busId)
            .get();

        const occupied = students.size;
        const remaining = bus.capacity - occupied;

        // Si le bus est complet
        if (remaining <= 0) {

            select.innerHTML += `
                <option disabled>
                    ${bus.busId} — ${chauffeur} (Complet)
                </option>
            `;

        } else {

            select.innerHTML += `
                <option value="${bus.busId}">
                    ${bus.busId} — ${chauffeur} (${remaining} places restantes)
                </option>
            `;

        }
    }
}

loadBuses();

// Départements par faculté
const departments = {
    "Sciences Informatiques": [
        "Génie Informatique",
        "Génie Logiciel",
        "inteligence artificielle",
    ],
    "Médecine": [
        "Médecine Générale",
        "soins Généraux",
    ],
    "Droit": [
        "Droit Minier et droit de l'environnement",
        "Droit numérique",
        "Droit des Affaires et Arbitrage",
        "Criminologie",
    ],
    "Économie": [
        "Économie de Gestion",
        "management",
    ],
    "Sciences Agronomiques": [
        "Technique Agricoles",
        "Sciences Agronomiques",
        "Gestion des ressources naturelles renouvelables",
        "Agroéconomique",
    ],
    "Polytechnique": [
        "Chimie industrielle",
        "Génie Civil",
        "Électromécanique",
        "Géologie et mines",
        "Génie électrique",
        "Pétrole et Gaz",
        "Métallurgie",
    
    ],
    "architecture": [
        "architecture"
    ],
    "information": [
        "journalisme et multi média",
        "Multimédia et communication digital",
        "communication des organisations",
    ],
};

// Chargement des départements
document.getElementById("faculty").addEventListener("change", function(){

    const faculty = this.value;
    const department = document.getElementById("department");

    department.innerHTML = "<option value=''>Sélectionner</option>";

    if(departments[faculty]){

        departments[faculty].forEach(dep=>{

            department.innerHTML += `
            <option value="${dep}">
                ${dep}
            </option>
            `;

        });

    }

});

// Inscription
document.getElementById("registerBtn").addEventListener("click", async()=>{

    const cardId = document.getElementById("cardId").value.trim().toUpperCase();
    const fullname = document.getElementById("fullname").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const faculty = document.getElementById("faculty").value;
    const department = document.getElementById("department").value;
    const promotion = document.getElementById("promotion").value;
    const bus = document.getElementById("bus").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(
        !cardId ||
        !fullname ||
        !email ||
        !phone ||
        !faculty ||
        !department ||
        !bus ||
        !promotion ||
        !password ||
        !confirmPassword
    ){
        message.className="error";
        message.innerHTML="Veuillez remplir tous les champs.";
        return;
    }

    if(password !== confirmPassword){

        message.className="error";
        message.innerHTML="Les mots de passe ne correspondent pas.";
        return;

    }

    try{

        // Vérifier si le numéro de carte existe déjà
        const doc = await db.collection("users").doc(cardId).get();

        if(doc.exists){

            message.className="error";
            message.innerHTML="Ce numéro de carte existe déjà.";
            return;

        }

        // Création du compte Firebase Authentication
        const userCredential = await firebase.auth()
        .createUserWithEmailAndPassword(email,password);

        const user = userCredential.user;

        // Enregistrement Firestore
        await db.collection("users").doc(cardId).set({

            uid:user.uid,
            cardId:cardId,
            fullname:fullname,
            email:email,
            phone:phone,
            faculty:faculty,
            department:department,
            promotion:promotion,
            bus: bus,
            role:"student",
            status:"active",
            createdAt:firebase.firestore.FieldValue.serverTimestamp()

        });

        message.className="success";
        message.innerHTML="Compte créé avec succès.";

        setTimeout(()=>{

            window.location.href="login.html";

        },1500);

    }

    catch(error){

        console.error(error);

        message.className="error";
        message.innerHTML=error.message;

    }

});

</script>

</body>
</html>
