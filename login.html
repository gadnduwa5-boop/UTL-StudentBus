<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - StudentBus</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:25px;
    width:350px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#1565c0;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

#msg{
    margin-top:10px;
    text-align:center;
    font-weight:bold;
}

</style>
</head>
<link rel="stylesheet" href="../css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">
<body>

<div style="text-align: center;">
    <img src="image/logo-studentbus.png" alt="UTL student
    Bus" width="180">
</div>

<div class="box">
<h2>Connexion</h2>

<input type="text" id="cardId" placeholder="Numéro de carte">
<input type="password" id="password" placeholder="Mot de passe">

<button onclick="loginUser()">Se connecter</button>
<p>
    pas de compte ?
    <a href="register.html">crée un compte</a>
</p>
<p id="msg"></p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>

<script>

async function loginUser(){

    const cardId = document.getElementById("cardId").value.trim().toUpperCase();
    const password = document.getElementById("password").value;

    if(!cardId || !password){
        alert("Veuillez remplir tous les champs.");
        return;
    }

    try{

        // Rechercher l'utilisateur avec son numéro de carte
        const doc = await db.collection("users").doc(cardId).get();

        if(!doc.exists){
            alert("Numéro de carte introuvable.");
            return;
        }

        const user = doc.data();

        // Connexion Firebase avec le vrai e-mail enregistré
        await firebase.auth().signInWithEmailAndPassword(
            user.email,
            password
        );

        // Sauvegarder les informations
        localStorage.setItem("cardId", user.cardId);
        localStorage.setItem("role", user.role);
        localStorage.setItem("fullname", user.fullname);

        // Redirection selon le rôle
        if(user.role === "student"){
            window.location.href = "student/dashboard.html";
        }

        else if(user.role === "chauffeur"){
            window.location.href = "driver/dashboard.html";
        }

        else if(user.role === "admin"){
            window.location.href = "admin/dashboard.html";
        }

        else{
            alert("Rôle inconnu.");
        }

    }
    catch(error){

        console.error(error);

        switch(error.code){

            case "auth/wrong-password":
                alert("Mot de passe incorrect.");
                break;

            case "auth/user-not-found":
                alert("Utilisateur introuvable.");
                break;

            default:
                alert(error.message);

        }

    }

}

</script>

</body>
</html>
