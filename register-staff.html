<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscription Personnel | UTL StudentBus</title>

<meta name="theme-color" content="#1565c0">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="css/auth.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="login-page">

    <!-- Colonne gauche -->

    <div class="login-left">

        <div class="brand">

            <img src="image/logo.png"
                 class="logo"
                 alt="UTL StudentBus">

            <h1>UTL StudentBus</h1>

            <p>

                Création d'un compte réservé au personnel autorisé.

            </p>

        </div>

        <div class="features">

            <div class="feature">

                <i class="fa-solid fa-user-shield"></i>

                <span>Accès sécurisé</span>

            </div>

            <div class="feature">

                <i class="fa-solid fa-user-tie"></i>

                <span>Espace Administrateur</span>

            </div>

            <div class="feature">

                <i class="fa-solid fa-bus"></i>

                <span>Espace Chauffeur</span>

            </div>

            <div class="feature">

                <i class="fa-solid fa-key"></i>

                <span>Inscription avec code d'invitation</span>

            </div>

        </div>

    </div>

    <!-- Colonne droite -->

    <div class="login-right">

        <div class="login-card">

            <h2>Inscription Personnel</h2>

            <p class="subtitle">

                Administrateurs et Chauffeurs

            </p>

            <form id="registerStaffForm">
<!--=========================================
 NOM COMPLET
==========================================-->

<div class="form-group">

    <label for="fullName">

        Nom complet

    </label>

    <div class="input-box">

        <i class="fa-solid fa-user"></i>

        <input
            type="text"
            id="fullName"
            name="fullName"
            placeholder="Nom complet"
            required>

    </div>

</div>

<!--=========================================
 SEXE
==========================================-->

<div class="form-group">

    <label for="gender">

        Sexe

    </label>

    <select
        id="gender"
        name="gender"
        class="form-control"
        required>

        <option value="">Sélectionnez</option>

        <option value="Masculin">Masculin</option>

        <option value="Féminin">Féminin</option>

    </select>

</div>

<!--=========================================
 TÉLÉPHONE
==========================================-->

<div class="form-group">

    <label for="phone">

        Téléphone

    </label>

    <div class="input-box">

        <i class="fa-solid fa-phone"></i>

        <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="+243xxxxxxxxx"
            required>

    </div>

</div>

<!--=========================================
 EMAIL
==========================================-->

<div class="form-group">

    <label for="email">

        Adresse e-mail

    </label>

    <div class="input-box">

        <i class="fa-solid fa-envelope"></i>

        <input
            type="email"
            id="email"
            name="email"
            placeholder="exemple@email.com"
            required>

    </div>

</div>

<!--=========================================
 NUMÉRO DE CARTE
==========================================-->

<div class="form-group">

    <label for="cardId">

        Numéro de carte

    </label>

    <div class="input-box">

        <i class="fa-solid fa-id-card"></i>

        <input
            type="text"
            id="cardId"
            name="cardId"
            maxlength="9"
            placeholder="251234567"
            required>

    </div>

</div>
<!--=========================================
 CODE D'INVITATION
==========================================-->

<div class="form-group">

    <label for="inviteCode">

        Code d'invitation

    </label>

    <div class="input-box">

        <i class="fa-solid fa-key"></i>

        <input
            type="text"
            id="inviteCode"
            name="inviteCode"
            placeholder="Saisissez le code d'invitation"
            required>

    </div>

</div>

<!--=========================================
 RÔLE
==========================================-->

<div class="form-group">

    <label for="role">

        Rôle

    </label>

    <select
        id="role"
        name="role"
        class="form-control"
        required>

        <option value="">

            Sélectionnez un rôle

        </option>

        <option value="admin">

            Administrateur

        </option>

        <option value="driver">

            Chauffeur

        </option>

    </select>

</div>
<div
    class="form-group"
    id="busGroup"
    style="display:none;">

    <label for="busId">

        Bus attribué

    </label>

    <select
        id="busId"
        name="busId"
        class="form-control">

        <option value="">

            Sélectionnez un bus

        </option>

    </select>

</div>

<!--=========================================
 MOT DE PASSE
==========================================-->

<div class="form-group">

    <label for="password">

        Mot de passe

    </label>

    <div class="input-box">

        <i class="fa-solid fa-lock"></i>

        <input
            type="password"
            id="password"
            name="password"
            placeholder="Créer un mot de passe"
            required>

        <button
            type="button"
            id="togglePassword"
            class="toggle-password">

            <i id="eyeIcon" class="fa-solid fa-eye"></i>

        </button>

    </div>

</div>

<!--=========================================
 CONFIRMATION
==========================================-->

<div class="form-group">

    <label for="confirmPassword">

        Confirmer le mot de passe

    </label>

    <div class="input-box">

        <i class="fa-solid fa-lock"></i>

        <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Confirmer le mot de passe"
            required>

    </div>

</div>
<!--=========================================
 CONDITIONS D'UTILISATION
==========================================-->

<div class="checkbox-group">

    <label>

        <input
            type="checkbox"
            id="acceptTerms"
            required>

        J'accepte les conditions d'utilisation
        de UTL StudentBus.

    </label>

</div>

<!--=========================================
 BOUTON INSCRIPTION
==========================================-->

<button
    type="submit"
    id="registerButton"
    class="login-btn">

    <span id="registerButtonText">

        <i class="fa-solid fa-user-plus"></i>

        Créer le compte

    </span>

    <span
        id="registerLoader"
        class="button-loader"
        style="display:none;">

        <i class="fa-solid fa-spinner fa-spin"></i>

        Création...

    </span>

</button>

</form>

<!--=========================================
 SÉPARATEUR
==========================================-->

<div class="divider">

    <span>OU</span>

</div>

<!--=========================================
 RETOUR CONNEXION
==========================================-->

<div class="login-footer">

    <p>

        Vous possédez déjà un compte ?

    </p>

    <a
        href="login.html"
        class="forgot-link">

        <i class="fa-solid fa-right-to-bracket"></i>

        Se connecter

    </a>

</div>

</div>

</div>

</div>

<!--=========================================
 LOADER
==========================================-->

<div
    id="loader"
    class="loader"
    style="display:none;">

    <div class="spinner"></div>

    <p>

        Création du compte...

    </p>

</div>
<div
    id="toast"
    class="toast"
    style="display:none;">

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>


<script src="js/config.js"></script>

<script src="js/register-staff.js"></script>

</body>

</html>
