<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Étudiant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

.header{
    background:#1565c0;
    color:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card h3{
    color:#1565c0;
    margin-bottom:10px;
}

.card p{
    margin:8px 0;
}

.status{
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    color:white;
    font-weight:bold;
}

.approved{
    background:#28a745;
}

.pending{
    background:#ffc107;
    color:black;
}

.rejected{
    background:#dc3545;
}

.logout{
    background:#dc3545;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<link rel="stylesheet" href="../css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">
<body>
<div class="header">
    <img src="../image/logo-studentbus.png"
    width="40"
    height="40"
    class="header-logo">
    <span>UTL StudentBus</span>
</div>
<div class="header">
    <h1>Dashboard Étudiant</h1>
</div>

<div class="card">
    <h3>👤 Informations Étudiant</h3>

    <p><strong>Nom :</strong> <span id="fullname">...</span></p>

    <p><strong>Card ID :</strong> <span id="cardId">...</span></p>

    <p>
        <strong>Statut :</strong>
        <span id="studentStatus"></span>
    </p>
</div>

<div class="card">
    <h3>🚍 Informations du Bus</h3>

    <p><strong>Bus :</strong> <span id="busId">Aucun</span></p>

    <p><strong>Nom :</strong> <span id="busName">-</span></p>

    <p><strong>Capacité :</strong> <span id="capacity">-</span></p>

    <p><strong>Statut :</strong> <span id="busStatus">-</span></p>
</div>

<div class="card">
    <h3>👨‍✈️ Chauffeur</h3>

    <p><strong>Nom :</strong> <span id="driverName">-</span></p>

    <p><strong>ID :</strong> <span id="driverId">-</span></p>
</div>

<button class="logout" onclick="logout()">
Déconnexion
</button>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="../js/firebase-config.js"></script>

<script>

if(localStorage.getItem("role") !== "student"){
    window.location.href="../login.html";
}

async function loadStudent(){

    const cardId = localStorage.getItem("cardId");

    if(!cardId){
        alert("Étudiant introuvable");
        return;
    }

    try{

        const studentDoc = await db
        .collection("users")
        .doc(cardId)
        .get();

        if(!studentDoc.exists){
            alert("Étudiant introuvable");
            return;
        }

        const student = studentDoc.data();

        document.getElementById("fullname").textContent =
            student.fullname || "-";

        document.getElementById("cardId").textContent =
            student.cardId || "-";

        let statusClass = "pending";

        if(student.status === "approved"){
            statusClass = "approved";
        }

        if(student.status === "rejected"){
            statusClass = "rejected";
        }

        document.getElementById("studentStatus").innerHTML =
            `<span class="status ${statusClass}">
                ${student.status || "pending"}
            </span>`;

        const busId = student.busId;

        if(!busId){
            return;
        }

        document.getElementById("busId").textContent = busId;

        const busDoc = await db
        .collection("buses")
        .doc(busId)
        .get();

        if(!busDoc.exists){
            return;
        }

        const bus = busDoc.data();

        document.getElementById("busName").textContent =
            bus.name || "-";

        document.getElementById("capacity").textContent =
            bus.capacity || "-";

        document.getElementById("busStatus").textContent =
            bus.status || "-";

        if(bus.driverId){

            const driverDoc = await db
            .collection("users")
            .doc(bus.driverId)
            .get();

            if(driverDoc.exists){

                const driver = driverDoc.data();

                document.getElementById("driverName").textContent =
                    driver.fullname || "-";

                document.getElementById("driverId").textContent =
                    driver.cardId || "-";
            }
        }

    }catch(error){

        console.error(error);
        alert(error.message);

    }
}

async function logout(){

    await firebase.auth().signOut();

    localStorage.clear();

    window.location.href="../login.html";
}

loadStudent();

</script>

</body>
</html>
