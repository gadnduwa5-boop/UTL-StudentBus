<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UTL StudentBus</title>

<link rel="shortcut icon" href="image/logo-studentbus.png" type="image/x-icon">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body {
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),url("image/image1.jpg");
    background-size: cover;
    background-position: center; 
    background-attachment: fixed; 
    color: white;                 
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
  }

.container{

background:white;
width:100%;
max-width:420px;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.25);

animation:fadeIn .8s;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{

width:120px;
margin-bottom:15px;

}

h1{

color: #e71b1b;
margin-bottom:10px;

}

p{

color:#666;
margin-bottom:30px;
line-height:1.5;

}

.btn{

display:block;
width:100%;
padding:15px;
margin:12px 0;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.3s;

}

.student{

background: #d20808;
color:white;

}

.student:hover{

background:#0d47a1;

}

.staff{

background:#ff9800;
color:white;

}

.staff:hover{

background:#ef6c00;

}

.login{

background:#28a745;
color:white;

}

.login:hover{

background:#1e7e34;

}

.footer{

margin-top:20px;
font-size:13px;
color:#888;

}

</style>

</head>

<body>

<div class="container">

<img src="image/logo-studentbus.png"
class="logo">

<h1>UTL StudentBus</h1>

<p>

Système intelligent de gestion du transport des étudiants de l'Université Technologique du Lualaba.

</p>

<button class="btn student"
onclick="window.location.href='register.html'">

🎓 Inscription Étudiant

</button>

<button class="btn staff"
onclick="window.location.href='register-staff.html'">

👨‍✈️ Inscription Personnel

</button>

<button class="btn login"
onclick="window.location.href='login.html'">

🔑 Se connecter

</button>

<div class="footer">



</div>

</div>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}

</script>

</body>
</html>
