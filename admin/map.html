<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UTL StudentBus PRO GPS</title>

<style>
body{
    margin:0;
    font-family:Arial;
}

.header{
    background:#1565c0;
    color:white;
    padding:12px;
    text-align:center;
    font-weight:bold;
}

#map{
    height:90vh;
    width:100%;
}

#etaBox{
    position:fixed;
    bottom:20px;
    left:20px;
    background:white;
    padding:12px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    font-size:14px;
}
</style>
<link rel="stylesheet" href="../css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">
</head>

<body>

<div class="header">
🚍 UTL StudentBus PRO - GPS Intelligent (Routes Réelles + ETA)
</div>

<div id="map"></div>

<div id="etaBox">
⏱️ ETA: --
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="../js/firebase-config.js"></script>

<script>

let map;

let busMarkers = {};
let studentMarkers = {};
let stopMarkers = {};

let directionsService;
let directionsRenderer;

const kolwezi = { lat: -10.7144, lng: 25.4667 };

/* =========================
   INIT MAP PRO
========================= */
function initMap(){

    map = new google.maps.Map(document.getElementById("map"), {
        center: kolwezi,
        zoom: 13,
        mapTypeId: "satellite"
    });

    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({
        map: map,
        suppressMarkers: true
    });

    listenBuses();
    listenStops();
    listenStudents();
}

/* =========================
   DISTANCE (Haversine)
========================= */
function getDistance(lat1, lng1, lat2, lng2){

    const R = 6371000;
    const toRad = v => v * Math.PI / 180;

    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);

    const a =
        Math.sin(dLat/2)**2 +
        Math.cos(toRad(lat1)) *
        Math.cos(toRad(lat2)) *
        Math.sin(dLng/2)**2;

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}

/* =========================
   🚏 STOPS
========================= */
function listenStops(){

    db.collection("bus_stops")
    .onSnapshot(snapshot => {

        snapshot.forEach(doc => {

            const stop = doc.data();
            if(!stop.lat || !stop.lng) return;

            const pos = { lat: stop.lat, lng: stop.lng };

            if(stopMarkers[stop.stopId]){
                stopMarkers[stop.stopId].setPosition(pos);
            } else {

                const marker = new google.maps.Marker({
                    position: pos,
                    map: map,
                    title: stop.name,
                    icon: "https://maps.google.com/mapfiles/ms/icons/yellow-dot.png"
                });

                stopMarkers[stop.stopId] = marker;
            }

        });

    });
}

/* =========================
   🚍 BUSES + ROUTE PRO
========================= */
function listenBuses(){

    db.collection("bus_locations")
    .onSnapshot(snapshot => {

        snapshot.forEach(doc => {

            const bus = doc.data();
            if(!bus.lat || !bus.lng) return;

            const id = bus.busId;

            const position = {
                lat: bus.lat,
                lng: bus.lng
            };

            /* MARKER BUS */
            if(busMarkers[id]){
                busMarkers[id].setPosition(position);
            } else {

                busMarkers[id] = new google.maps.Marker({
                    position: position,
                    map: map,
                    title: id,
                    icon: "https://maps.google.com/mapfiles/ms/icons/bus.png"
                });
            }

            /* 🧭 ROUTE RÉELLE GOOGLE */
            const nextStop = getNearestStop(position);

            if(nextStop){
                drawRoute(position, nextStop);
            }

        });

    });

}

/* =========================
   🎓 STUDENTS
========================= */
function listenStudents(){

    db.collection("users")
    .where("role","==","student")
    .onSnapshot(snapshot => {

        snapshot.forEach(doc => {

            const s = doc.data();
            if(!s.lat || !s.lng) return;

            const pos = { lat: s.lat, lng: s.lng };

            if(studentMarkers[doc.id]){
                studentMarkers[doc.id].setPosition(pos);
            } else {

                studentMarkers[doc.id] = new google.maps.Marker({
                    position: pos,
                    map: map,
                    title: s.fullname,
                    icon: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
                });
            }

        });

    });
}

/* =========================
   🚏 STOP LE PLUS PROCHE
========================= */
function getNearestStop(busPos){

    let nearest = null;
    let minDist = Infinity;

    Object.values(stopMarkers).forEach(stop => {

        const pos = stop.getPosition();

        const dist = getDistance(
            busPos.lat,
            busPos.lng,
            pos.lat(),
            pos.lng()
        );

        if(dist < minDist){
            minDist = dist;
            nearest = pos;
        }

    });

    return nearest;
}

/* =========================
   🧭 GOOGLE DIRECTIONS API
========================= */
function drawRoute(origin, destination){

    directionsService.route(
        {
            origin: origin,
            destination: destination,
            travelMode: google.maps.TravelMode.DRIVING
        },
        (result, status) => {

            if(status === "OK"){

                directionsRenderer.setDirections(result);

                const leg = result.routes[0].legs[0];

                document.getElementById("etaBox").innerHTML = `
                    🗺️ Distance: ${leg.distance.text}<br>
                    ⏱️ ETA Google: ${leg.duration.text}
                `;
            }
        }
    );

}

</script>

<!-- Google Maps API -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAzKSRiCHiFLv6DTGlnctN20QXHr3NR-NM&callback=initMap">
</script>

</body>
</html>
