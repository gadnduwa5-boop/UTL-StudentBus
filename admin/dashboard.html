<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard V2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

.header{
    background:#1565c0;
    color:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
    text-align:center;
}

.card h2{
    color:#1565c0;
    font-size:28px;
}

.card p{
    margin-top:10px;
    color:#555;
}

.btns{
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

a{
    text-decoration:none;
    background:#1565c0;
    color:white;
    padding:10px 15px;
    border-radius:8px;
}
</style>
</head>
<link rel="stylesheet" href="../css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">
<body>

<div class="header">
    <img src="../image/logo-studentbus.png"
    width="40"
    height="40"
    class="header-logo">
    <span>UTL StudentBus</span>
</div>

<div class="grid">

<div class="card">
    <h2 id="students">0</h2>
    <p>🎓 Étudiants</p>
</div>

<div class="card">
    <h2 id="drivers">0</h2>
    <p>👨‍✈️ Chauffeurs</p>
</div>

<div class="card">
    <h2 id="buses">0</h2>
    <p>🚍 Bus</p>
</div>

<div class="card">
    <h2 id="assigned">0</h2>
    <p>📌 Affectés</p>
</div>

</div>

<div class="btns">

<a href="buses.html">🚍 Bus</a>
<a href="drivers.html">👨‍✈️ Chauffeurs</a>
<a href="students.html">🎓 Étudiants</a>
<a href="assignments.html">📋 Affectations</a>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="../js/firebase-config.js"></script>

<script>

if(localStorage.getItem("role") !== "admin"){
    window.location.href="../login.html";
}

async function loadStats(){

    try{

        const usersSnap = await db.collection("users").get();
        const busesSnap = await db.collection("buses").get();

        let students = 0;
        let drivers = 0;
        let assigned = 0;

        usersSnap.forEach(doc=>{

            const u = doc.data();

            if(u.role === "student"){
                students++;
            }

            if(u.role === "chauffeur"){
                drivers++;
            }

            if(u.busId){
                assigned++;
            }

        });

        document.getElementById("students").textContent = students;
        document.getElementById("drivers").textContent = drivers;
        document.getElementById("buses").textContent = busesSnap.size;
        document.getElementById("assigned").textContent = assigned;

    }catch(error){
        console.error(error);
    }
}

loadStats();

</script>

</body>
</html>
