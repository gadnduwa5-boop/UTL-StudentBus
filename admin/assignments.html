<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion des Affectations</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

h1{
    color:#1565c0;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

h2{
    color:#1565c0;
    margin-bottom:15px;
}

select{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#1565c0;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

.success{
    background:#d4edda;
    color:#155724;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
    display:none;
}
</style>
</head>
<link rel="stylesheet" href="../css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">
<body>

<h1>📋 Gestion des Affectations</h1>

<!-- Chauffeurs -->
<div class="card">

<h2>🚍 Affecter un Chauffeur</h2>

<select id="driverSelect">
<option value="">Sélectionner un chauffeur</option>
</select>

<select id="driverBusSelect">
<option value="">Sélectionner un bus</option>
</select>

<button onclick="assignDriver()">
Affecter le Chauffeur
</button>

<div id="driverMsg" class="success"></div>

</div>

<!-- Étudiants -->
<div class="card">

<h2>🎓 Affecter un Étudiant</h2>

<select id="studentSelect">
<option value="">Sélectionner un étudiant</option>
</select>

<select id="studentBusSelect">
<option value="">Sélectionner un bus</option>
</select>

<button onclick="assignStudent()">
Affecter l'Étudiant
</button>

<div id="studentMsg" class="success"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="../js/firebase-config.js"></script>

<script>

if(localStorage.getItem("role") !== "admin"){
    window.location.href="../login.html";
}

/* ================= CHARGEMENT ================= */

async function loadData(){

    const usersSnap =
    await db.collection("users").get();

    const busesSnap =
    await db.collection("buses").get();

    const driverSelect =
    document.getElementById("driverSelect");

    const studentSelect =
    document.getElementById("studentSelect");

    const driverBusSelect =
    document.getElementById("driverBusSelect");

    const studentBusSelect =
    document.getElementById("studentBusSelect");

    usersSnap.forEach(doc=>{

        const user = doc.data();

        if(user.role === "chauffeur"){

            driverSelect.innerHTML += `
            <option value="${doc.id}">
                ${user.fullname} (${user.cardId})
            </option>
            `;
        }

        if(user.role === "student"){

            studentSelect.innerHTML += `
            <option value="${doc.id}">
                ${user.fullname} (${user.cardId})
            </option>
            `;
        }

    });

    busesSnap.forEach(doc=>{

        const bus = doc.data();

        const option = `
        <option value="${doc.id}">
            ${bus.busId} - ${bus.name}
        </option>
        `;

        driverBusSelect.innerHTML += option;
        studentBusSelect.innerHTML += option;

    });

}

/* ================= AFFECTER CHAUFFEUR ================= */

async function assignDriver(){

    const driverId =
    document.getElementById("driverSelect").value;

    const busId =
    document.getElementById("driverBusSelect").value;

    if(!driverId || !busId){

        alert("Veuillez sélectionner un chauffeur et un bus");
        return;
    }

    try{

        await db.collection("users")
        .doc(driverId)
        .update({
            busId: busId
        });

        await db.collection("buses")
        .doc(busId)
        .update({
            driverId: driverId
        });

        const msg =
        document.getElementById("driverMsg");

        msg.style.display = "block";
        msg.innerText =
        "✅ Chauffeur affecté avec succès";

    }catch(error){

        alert(error.message);

    }
}

/* ================= AFFECTER ÉTUDIANT ================= */

async function assignStudent(){

    const studentId =
    document.getElementById("studentSelect").value;

    const busId =
    document.getElementById("studentBusSelect").value;

    if(!studentId || !busId){

        alert("Veuillez sélectionner un étudiant et un bus");
        return;
    }

    try{

        await db.collection("users")
        .doc(studentId)
        .update({
            busId: busId
        });

        const msg =
        document.getElementById("studentMsg");

        msg.style.display = "block";
        msg.innerText =
        "✅ Étudiant affecté avec succès";

    }catch(error){

        alert(error.message);

    }
}

loadData();

</script>

</body>
</html>
