<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestion des Codes d'Invitation</title>

<link rel="stylesheet" href="../css/invitation-codes.css">

</head>

<body>

<div class="container">

<h1>🔑 Gestion des Codes d'Invitation</h1>

<div class="card">

<h2>Créer un nouveau code</h2>

<select id="role">

<option value="admin">Administrateur</option>

<option value="chauffeur">Chauffeur</option>

</select>

<button id="generateBtn">

Générer un code

</button>

</div>

<div class="card">

<h2>Liste des codes</h2>

<table>

<thead>

<tr>

<th>Code</th>

<th>Rôle</th>

<th>Statut</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="codesTable">

</tbody>

</table>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="../js/firebase-config.js"></script>

<script src="../js/invitation-codes.js"></script>

</body>

</html>
